# Per-CAV gate tuning (CAV02)
# Role:
# - Optional overrides on top of priority_gate_common.yaml.
# - Use for vehicle-specific close-range behavior.
/**:
  ros__parameters:
    # Immediate pose stop/release around near-term overlap zone.
    immediate_pose_stop_distance: 0.92
    immediate_pose_release_distance: 1.08
    immediate_overlap_distance: 0.68

    # Emergency stop/release around very close pose conflict.
    emergency_pose_stop_distance: 0.82
    emergency_pose_release_distance: 0.98
